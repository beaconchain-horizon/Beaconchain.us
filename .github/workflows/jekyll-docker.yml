# Horizon Core Engine – Beaconchain Official Wiki

**Offline‑first, API‑based blockchain validator and license manager.**  
Built with **Go**, **SQLite**, **Merkle trees**, and **ECDSA signatures**.

Horizon is an open‑source, security‑hardened blockchain monitoring platform that powers a volume‑based prepaid API model using provable Merkle trees. This wiki provides comprehensive documentation for developers, contributors, and enterprise users.

